# Primary Postgres configuration for the pgsleuth dev fixture.
#
# Only overrides what the fixture needs — everything else falls back to
# the postgres:17-bookworm image defaults. Tuned for development /
# integration testing, NOT for production.

# --- network -----------------------------------------------------------------
listen_addresses = '*'

# --- replication (Tier 1 collector tests need a primary + standbys) ----------
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
hot_standby_feedback = on
# Keep at least 1 GB of WAL around so concurrent first-boot pg_basebackups
# on the two replicas don't race a recycled segment. The replication slots
# also pin WAL but only AFTER each base backup picks up its slot — the
# bootstrap window needs this safety net.
wal_keep_size = 1GB

# --- extensions the fixture exists to exercise -------------------------------
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# pg_stat_statements: keep a deep history so polling collectors have
# something to look at across restarts of the agent (not the DB).
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on

# auto_explain: log anything taking longer than 100ms with EXPLAIN ANALYZE.
# JSON format keeps the brain's parser simple later on.
auto_explain.log_min_duration = '100ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_format = json
auto_explain.log_nested_statements = on

# --- logging — be chatty so dev iterations have signal ----------------------
log_destination = 'stderr'
logging_collector = off
log_min_messages = info
log_line_prefix = '%m [%p] %q%u@%d '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_temp_files = 0
