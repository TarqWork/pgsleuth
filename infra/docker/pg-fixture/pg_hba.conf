# pg_hba for the pgsleuth dev fixture. Trust everywhere; this is a
# development bind, never face it at production credentials.
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             0.0.0.0/0               trust
host    all             all             ::/0                    trust
# Replication: require the password so pg_basebackup from a replica is
# explicit. Password set in init-primary.sql.
host    replication     replicator      0.0.0.0/0               md5
host    replication     replicator      ::/0                    md5
