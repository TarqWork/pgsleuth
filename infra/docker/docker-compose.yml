services:
  rust-dev:
    build:
      context: ../../
      dockerfile: infra/docker/rust-dev.Dockerfile
    image: pgsleuth/rust-dev
    container_name: pgsleuth-rust-dev
    volumes:
      - ../../../:/workspace/source        # Source code mount
      - ./build.sh:/workspace/build.sh     # Build script
      - ./ebpf-target:/workspace/build     # Local host directory mount
    working_dir: /workspace/source/pgsleuth/
    networks:
      - pgsleuth-net
    environment:
      CARGO_TARGET_DIR: /workspace/build/target
    command: ["bash", "/workspace/build.sh", "ebpf"]
    # tty: true
    # stdin_open: true
    # command: ["bash", "-c", "/workspace/build.sh ebpf && tail -f /dev/null"]

  ebpf-feasibility:
    build:
      context: ../../
      dockerfile: infra/docker/ebpf-feasibility.Dockerfile
      target: ${EBPF_TARGET:-prod}
    image: pgsleuth/ebpf-feasibility:${EBPF_TARGET:-prod}
    container_name: pgsleuth-ebpf-feasibility
    volumes:
      - ./ebpf-target:/workspace/build     # Shared local host directory
      - ./setup-postgres.sh:/workspace/setup-postgres.sh
      - ./load-ebpf.sh:/workspace/load-ebpf.sh
      - ./install-pg-ext.sh:/workspace/install-pg-ext.sh
      - ./validate-wal-device.sh:/workspace/validate-wal-device.sh
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf
      # setup-postgres.sh mounts tracefs at /sys/kernel/tracing inside
      # the container so aya can attach kernel tracepoints
      # (block:block_rq_issue, etc.). Requires SYS_ADMIN, which we
      # already have for bpffs.
    # Tightened capability set per #40. Minimum that works on kernel
    # ≥ 5.8 for the six Tier-1 alarms shipped in v0:
    #   CAP_BPF      — load eBPF programs + create maps
    #   CAP_PERFMON  — attach kprobes / tracepoints (perf_event_open)
    #   CAP_SYS_ADMIN — mount tracefs at /sys/kernel/tracing; bpffs ops
    # CAP_NET_ADMIN is intentionally absent. It is required for the
    # network-side eBPF programs (sched:sched_switch, inet_csk_accept)
    # the rule engine will eventually wire for the eBPF half of #44;
    # add it back at that point.
    cap_add:
      - BPF
      - PERFMON
      - SYS_ADMIN
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    working_dir: /workspace/build
    networks:
      - pgsleuth-net
    command: ["bash", "/workspace/setup-postgres.sh"]

networks:
  pgsleuth-net:
    driver: bridge
